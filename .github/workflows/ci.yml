name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run build
          else
            echo "::notice::Нет package.json — CI-заготовка (см. задачу W-01). Пропуск."
          fi
